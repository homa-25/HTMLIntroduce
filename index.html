<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COSMIC RAIL 3D | 銀河を駆け抜けろ</title>
    <script src="https://homa-25.github.io/HTMLGame/"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen">

    <main class="max-w-4xl mx-auto px-6 py-16">
        <header class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-500 mb-4 tracking-tight">
                COSMIC RAIL 3D
            </h1>
            <p class="text-xl text-cyan-200">リアルタイム3Dで挑む、過酷なアステロイドベルト突破作戦。</p>
        </header>

        <section class="grid md:grid-cols-2 gap-12 items-center mb-16">
            <div class="space-y-6">
                <h2 class="text-3xl font-bold text-white border-l-4 border-cyan-500 pl-4">銀河の危機に立ち向かえ</h2>
                <p class="text-gray-300 leading-relaxed">
                    宇宙の彼方、突如出現したアステロイドベルトが航路を塞いだ！<br>
                    高性能戦闘機を駆り、30秒間の極限ミッションを生き延びろ。迫りくる隕石を破壊し、パワーアップアイテムで武装を強化せよ。
                </p>
                <div class="flex gap-4">
                    <!-- リンク先を公式サイトのURLに変更しただなも -->
                    <a href="https://homa-25.github.io/HTMLGame/" class="px-8 py-4 bg-gradient-to-r from-cyan-500 to-indigo-600 hover:scale-105 transition-transform rounded-full font-bold shadow-lg shadow-cyan-500/30">
                        <i class="fa-solid fa-rocket mr-2"></i>今すぐ出撃する
                    </a>
                </div>
            </div>
            
            <div class="bg-indigo-950/50 p-8 rounded-2xl border border-indigo-500/30">
                <ul class="space-y-4">
                    <li class="flex items-start">
                        <i class="fa-solid fa-cube text-cyan-400 mt-1 mr-3"></i>
                        <span>没入感のあるフル3D環境</span>
                    </li>
                    <li class="flex items-start">
                        <i class="fa-solid fa-crosshairs text-cyan-400 mt-1 mr-3"></i>
                        <span>直感的なマウス/タッチ操作エイム</span>
                    </li>
                    <li class="flex items-start">
                        <i class="fa-solid fa-bolt text-cyan-400 mt-1 mr-3"></i>
                        <span>3段階のウェポンパワーアップ</span>
                    </li>
                    <li class="flex items-start">
                        <i class="fa-solid fa-shield text-cyan-400 mt-1 mr-3"></i>
                        <span>緊急回避ローリングシステム</span>
                    </li>
                </ul>
            </div>
        </section>

        <footer class="text-center text-gray-500 text-sm border-t border-indigo-900 pt-8">
            &copy; 2026 Cosmic Rail 3D Team. All rights reserved.
        </footer>
    </main>

</body>
</html>
